<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:22px 24px;box-sizing:border-box;display:flex;gap:24px;align-items:center}
  .logo{flex:none}
  .logo img{height:120px;display:block}
  .cols{flex:1;display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--r-md);padding:14px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;min-height:96px}
  .lab{font-size:13px;font-weight:700}
  .hex{font-size:12px;font-family:var(--font-code);opacity:.9}
</style>
</head>
<body>
  <div class="logo"><img src="../assets/logo-stacked.png" alt="Gorman Medical and Specialty Center"></div>
  <div class="cols">
    <div class="sw" style="background:var(--c-brand-green)"><div class="lab">Brand Green</div><div class="hex">#84C048</div></div>
    <div class="sw" style="background:var(--c-brand-blue)"><div class="lab">Brand Blue</div><div class="hex">#4884C0</div></div>
  </div>
</body>
</html>
