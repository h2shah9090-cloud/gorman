<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:24px;box-sizing:border-box}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .bar{height:16px;background:var(--c-brand-green);border-radius:2px}
  .lab{width:96px;font-size:12px;color:var(--c-ink);font-weight:600}
  .val{font-family:var(--font-code);font-size:11px;color:var(--c-steel)}
</style>
</head>
<body>
  <div class="row"><span class="lab">xxs–md</span><div class="bar" style="width:4px"></div><div class="bar" style="width:8px"></div><div class="bar" style="width:12px"></div><div class="bar" style="width:16px"></div><span class="val">4 · 8 · 12 · 16</span></div>
  <div class="row"><span class="lab">lg · xl · xxl</span><div class="bar" style="width:24px"></div><div class="bar" style="width:32px"></div><div class="bar" style="width:48px"></div><span class="val">24 · 32 · 48</span></div>
  <div class="row"><span class="lab">section</span><div class="bar" style="width:64px"></div><span class="val">64 — pricing/learn rhythm</span></div>
  <div class="row"><span class="lab">section-lg</span><div class="bar" style="width:96px"></div><span class="val">96 — marketing rhythm</span></div>
  <div class="row"><span class="lab">hero</span><div class="bar" style="width:120px"></div><span class="val">120 — hero band padding</span></div>
</body>
</html>
