<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:0;box-sizing:border-box}
  .promo{background:var(--c-brand-blue-deep);color:var(--c-on-dark);font-size:14px;font-weight:500;text-align:center;padding:12px 16px}
  .promo b{color:var(--c-brand-green-bright)}
  .nav{display:flex;align-items:center;gap:24px;padding:14px 24px;border-bottom:1px solid var(--c-hairline)}
  .logo img{height:46px;display:block}
  .links{display:flex;gap:20px;font-size:14px;color:var(--c-slate);font-weight:500}
  .spacer{flex:1}
  .cta{background:var(--c-brand-green);color:var(--c-on-primary);font-weight:600;font-size:14px;border:none;padding:9px 18px;border-radius:var(--r-full)}
</style>
</head>
<body>
  <div class="promo">Now accepting new patients — <b>book your appointment today</b></div>
  <div class="nav">
    <div class="logo"><img src="../assets/logo-horizontal.png" alt="Gorman Medical and Specialty Center"></div>
    <div class="links"><span>Services</span><span>Specialties</span><span>Providers</span><span>Patients</span></div>
    <div class="spacer"></div>
    <span style="font-size:14px;color:var(--c-slate);font-weight:500">Patient Portal</span>
    <button class="cta">Book Appointment</button>
  </div>
</body>
</html>
