<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:0;align-items:stretch}
  .sw{flex:1;padding:6px 4px}
  .dot{width:36px;height:36px;border-radius:50%;border:1px solid var(--c-hairline);margin-bottom:10px}
  .name{font-size:13px;font-weight:600}
  .meta{font-size:11px;color:var(--c-steel);font-family:var(--font-code)}
  .sample{font-size:15px;font-weight:500;margin-bottom:6px}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:var(--c-ink)"></div><div class="sample" style="color:var(--c-ink)">Ink</div><div class="meta">#001E2B</div></div>
    <div class="sw"><div class="dot" style="background:var(--c-charcoal)"></div><div class="sample" style="color:var(--c-charcoal)">Charcoal</div><div class="meta">#21313C</div></div>
    <div class="sw"><div class="dot" style="background:var(--c-slate)"></div><div class="sample" style="color:var(--c-slate)">Slate</div><div class="meta">#3D4F58</div></div>
    <div class="sw"><div class="dot" style="background:var(--c-steel)"></div><div class="sample" style="color:var(--c-steel)">Steel</div><div class="meta">#5C6C75</div></div>
    <div class="sw"><div class="dot" style="background:var(--c-stone)"></div><div class="sample" style="color:var(--c-stone)">Stone</div><div class="meta">#889397</div></div>
    <div class="sw"><div class="dot" style="background:var(--c-muted)"></div><div class="sample" style="color:var(--c-muted)">Muted</div><div class="meta">#C1C7C6</div></div>
  </div>
</body>
</html>
