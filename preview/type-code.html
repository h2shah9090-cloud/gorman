<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:24px;box-sizing:border-box}
  .block{background:var(--c-canvas-dark);border-radius:var(--r-md);padding:18px 20px;color:var(--c-on-dark)}
  pre{margin:0;font-family:var(--font-code);font-size:14px;line-height:1.55}
  .g{color:#71F6BA}.b{color:#83C9F4}.s{color:#E0E0E0}.c{color:#7A8B92}
  .cap{margin-top:12px;font-family:var(--font-code);font-size:11px;color:var(--c-steel)}
</style>
</head>
<body>
  <div class="block"><pre><span class="c">// Source Code Pro · code-md · 14/400</span>
<span class="g">db</span>.<span class="b">users</span>.<span class="g">insertOne</span>({ name: <span class="s">"Ada"</span>, role: <span class="s">"admin"</span> })</pre></div>
  <div class="cap">code-block · canvas-dark #001E2B · radius 8px</div>
</body>
</html>
