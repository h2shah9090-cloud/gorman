<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:24px;box-sizing:border-box;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .b{font-size:13px;font-weight:600;display:inline-flex;align-items:center}
  .green{background:var(--c-brand-green);color:var(--c-on-primary);border-radius:var(--r-sm);padding:2px 8px}
  .green-soft{background:var(--c-brand-green-soft);color:var(--c-brand-green-dark);border-radius:var(--r-full);padding:4px 10px}
  .popular{background:var(--c-brand-teal-deep);color:var(--c-brand-green);border-radius:var(--r-full);padding:4px 10px}
  .purple{background:var(--c-accent-purple);color:#fff;border-radius:var(--r-xs);padding:2px 8px;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
  .orange{background:var(--c-accent-orange);color:#fff;border-radius:var(--r-xs);padding:2px 8px;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
  .blue{background:var(--c-accent-blue);color:#fff;border-radius:var(--r-xs);padding:2px 8px;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
</style>
</head>
<body>
  <span class="b green">NEW</span>
  <span class="b green-soft">Free forever</span>
  <span class="b popular">Most Popular</span>
  <span class="b purple">Security</span>
  <span class="b orange">Search</span>
  <span class="b blue">Atlas</span>
</body>
</html>
