<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-surface);font-family:var(--font-display);padding:24px;box-sizing:border-box;display:flex;gap:18px}
  .tile{flex:1;background:var(--c-canvas);border:1px solid var(--c-hairline);border-radius:var(--r-lg);padding:22px;display:flex;flex-direction:column;gap:10px}
  .tag{align-self:flex-start;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#fff;border-radius:var(--r-xs);padding:3px 9px}
  h5{margin:0;font-size:18px;font-weight:600;color:var(--c-ink);line-height:1.4}
  p{margin:0;font-size:14px;line-height:1.5;color:var(--c-steel)}
  .go{margin-top:auto;font-size:14px;font-weight:500;color:var(--c-brand-green-dark);text-decoration:none}
</style>
</head>
<body>
  <div class="tile">
    <span class="tag" style="background:var(--c-accent-purple)">Database &amp; Security</span>
    <h5>Securing MongoDB</h5>
    <p>Configure authentication, encryption, and network access for production.</p>
    <a class="go" href="#">Get Started →</a>
  </div>
  <div class="tile">
    <span class="tag" style="background:var(--c-accent-orange)">Search</span>
    <h5>Atlas Search Fundamentals</h5>
    <p>Build full-text search into your application with Atlas Search indexes.</p>
    <a class="go" href="#">Get Started →</a>
  </div>
</body>
</html>
