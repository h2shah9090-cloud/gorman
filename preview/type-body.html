<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);color:var(--c-ink);padding:28px;box-sizing:border-box}
  .line{margin-bottom:12px;display:flex;align-items:baseline;gap:14px}
  .spec{font-family:var(--font-code);font-size:11px;color:var(--c-steel);white-space:nowrap}
  .micro{color:var(--c-steel)}
</style>
</head>
<body>
  <div class="line"><span class="t-subtitle">Subtitle / lead — start free, scale as you grow.</span><span class="spec">18 / 400 / lh 1.5</span></div>
  <div class="line"><span class="t-body-md">Body — the database for modern applications.</span><span class="spec">16 / 400 / lh 1.55</span></div>
  <div class="line"><span class="t-body-sm">Body small — secondary text and table cells.</span><span class="spec">14 / 400</span></div>
  <div class="line"><span class="t-body-sm-med">Body small medium — active nav, button labels.</span><span class="spec">14 / 500</span></div>
  <div class="line"><span class="t-micro micro">Section eyebrow · category tag</span><span class="spec">11 / 600 / +1px / caps</span></div>
</body>
</html>
