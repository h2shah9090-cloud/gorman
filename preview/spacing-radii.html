<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:24px;box-sizing:border-box;display:flex;gap:16px;align-items:flex-end}
  .sw{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
  .box{width:100%;height:64px;background:var(--c-surface);border:1.5px solid var(--c-brand-green-dark)}
  .name{font-size:12px;font-weight:600;color:var(--c-ink)}
  .val{font-family:var(--font-code);font-size:11px;color:var(--c-steel)}
  .pill{height:40px;border-radius:var(--r-full)!important}
</style>
</head>
<body>
  <div class="sw"><div class="box" style="border-radius:var(--r-xs)"></div><div class="name">xs</div><div class="val">4</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--r-sm)"></div><div class="name">sm</div><div class="val">6</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--r-md)"></div><div class="name">md</div><div class="val">8</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--r-lg)"></div><div class="name">lg</div><div class="val">12</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--r-xl)"></div><div class="name">xl</div><div class="val">16</div></div>
  <div class="sw"><div class="box" style="border-radius:var(--r-xxl)"></div><div class="name">xxl</div><div class="val">24</div></div>
  <div class="sw"><div class="box pill"></div><div class="name">full</div><div class="val">pill</div></div>
</body>
</html>
