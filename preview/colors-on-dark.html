<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas-dark);font-family:var(--font-display);padding:24px;box-sizing:border-box;display:flex;gap:28px;align-items:center}
  .block{display:flex;flex-direction:column;gap:6px}
  .lab{font-size:11px;font-family:var(--font-code)}
  .on{color:var(--c-on-dark);font-size:20px;font-weight:500}
  .onm{color:var(--c-on-dark-muted);font-size:20px;font-weight:500}
  .pill{display:inline-block;background:var(--c-brand-green);color:var(--c-on-primary);font-size:14px;font-weight:600;padding:10px 22px;border-radius:var(--r-full)}
  .border{border:1px solid var(--c-hairline-dark);border-radius:var(--r-md);padding:14px 18px;color:var(--c-on-dark);font-size:13px}
</style>
</head>
<body>
  <div class="block"><div class="on">On Dark</div><div class="lab" style="color:var(--c-on-dark-muted)">#FFFFFF</div></div>
  <div class="block"><div class="onm">On Dark Muted</div><div class="lab" style="color:var(--c-on-dark-muted)">rgba(255,255,255,.72)</div></div>
  <div class="block"><div class="pill">Try Free</div><div class="lab" style="color:var(--c-on-dark-muted)">green on dark</div></div>
  <div class="block"><div class="border">hairline-dark</div></div>
</body>
</html>
