<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-brand-teal-deep);font-family:var(--font-display);padding:24px;box-sizing:border-box;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
  button{font-family:var(--font-display);font-size:14px;font-weight:600;cursor:pointer;border:none;padding:10px 22px;border-radius:var(--r-full)}
  .on-dark{background:var(--c-brand-green);color:var(--c-on-primary)}
  .sec-on-dark{background:transparent;color:var(--c-on-dark);border:1px solid var(--c-hairline-dark)}
  .lab{color:var(--c-on-dark-muted);font-size:12px;font-family:var(--font-code)}
</style>
</head>
<body>
  <button class="on-dark">Get started</button>
  <button class="sec-on-dark">View docs</button>
  <span class="lab">buttons on deep-teal hero band</span>
</body>
</html>
