<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:16px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:84px;border-radius:var(--r-md);border:1px solid var(--c-hairline)}
  .name{font-size:13px;font-weight:600;color:var(--c-ink)}
  .meta{font-size:12px;color:var(--c-steel);font-family:var(--font-code)}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--c-brand-teal-deep)"></div><div class="name">Teal Deep</div><div class="meta">#001E2B · hero/footer</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-brand-teal)"></div><div class="name">Teal</div><div class="meta">#023430</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-brand-teal-mid)"></div><div class="name">Teal Mid</div><div class="meta">#112733 · platform card</div></div>
  </div>
</body>
</html>
