<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);color:var(--c-ink);padding:28px;box-sizing:border-box}
  .line{display:flex;align-items:baseline;gap:14px;margin-bottom:10px}
  .spec{font-family:var(--font-code);font-size:11px;color:var(--c-steel);white-space:nowrap}
</style>
</head>
<body>
  <div class="line"><span class="t-h1">Heading 1</span><span class="spec">48 / 500 / -0.5px</span></div>
  <div class="line"><span class="t-h2">Heading 2</span><span class="spec">36 / 500 / -0.5px</span></div>
  <div class="line"><span class="t-h3">Heading 3</span><span class="spec">28 / 500</span></div>
  <div class="line"><span class="t-h4">Heading 4</span><span class="spec">22 / 500</span></div>
  <div class="line"><span class="t-h5">Heading 5</span><span class="spec">18 / 600</span></div>
</body>
</html>
