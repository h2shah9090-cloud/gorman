<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--c-canvas);font-family:var(--font-display);padding:24px;box-sizing:border-box}
  .row{display:flex;gap:16px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:84px;border-radius:var(--r-md)}
  .name{font-size:13px;font-weight:600;color:var(--c-ink)}
  .meta{font-size:12px;color:var(--c-steel);font-family:var(--font-code)}
  .note{margin-top:14px;font-size:12px;color:var(--c-stone)}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--c-accent-purple)"></div><div class="name">Purple</div><div class="meta">#6E3FC9</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-accent-orange)"></div><div class="name">Orange</div><div class="meta">#C2570C</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-accent-pink)"></div><div class="name">Pink</div><div class="meta">#C0317A</div></div>
    <div class="sw"><div class="chip" style="background:var(--c-accent-blue)"></div><div class="name">Blue</div><div class="meta">#016BF8</div></div>
  </div>
  <div class="note">Course category tags only — never used elsewhere in the UI.</div>
</body>
</html>
